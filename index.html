    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              "space-grotesk": ["Space Grotesk", "sans-serif"],
            },
            animation: {
              "blur-in": "blurIn 0.7s ease-out forwards",
            },
            keyframes: {
              blurIn: {
                "0%": { filter: "blur(5px)", opacity: "0" },
                "100%": { filter: "blur(0)", opacity: "1" },
              },
            },
            colors: {
              white: "#fff",
              black: "#000",
              gray: {
                100: "#f5f5f5",
                200: "#e5e5e5",
                300: "#d4d4d4",
                400: "#a3a3a3",
                500: "#737373",
                600: "#525252",
                700: "#404040",
                800: "#262626",
                900: "#181818",
              },
            },
          },
        },
        darkMode: "selector",
      };

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="canonical" href="" id="canonical-link" />
    <style>
      .text-dynamic-primary {
        color: var(--primary-color);
      }
      
      /* Modern CSS Enhancements */
      :root {
        --primary: #1d2b50;
        --accent: #fb4a28;
        --glow-color: rgba(29, 43, 80, 0.15);
      }
      
      /* Smooth scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      
      ::-webkit-scrollbar-thumb {
        background: var(--primary);
        border-radius: 10px;
      }
      
      /* Glassmorphism effect */
      .glass {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.2);
      }
      
      .dark .glass {
        background: rgba(24, 24, 27, 0.7);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      
      /* Accent text */
      .gradient-text {
        color: var(--accent);
      }
      
      /* Card hover effects */
      .card-hover {
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      
      .card-hover:hover {
        transform: translateY(-4px);
        box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.15);
      }
      
      .dark .card-hover:hover {
        box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.5);
      }
      
      /* Accent border */
      .accent-border {
        position: relative;
      }
      
      .accent-border::before {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: inherit;
        padding: 2px;
        background: var(--accent);
        -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        pointer-events: none;
      }
      
      /* Profile image glow */
      .profile-glow {
        box-shadow: 0 0 40px var(--glow-color);
        transition: box-shadow 0.3s ease;
      }
      
      .profile-glow:hover {
        box-shadow: 0 0 60px var(--glow-color), 0 0 80px var(--glow-color);
      }
      
      /* Floating animation */
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }
      
      .float-animation {
        animation: float 3s ease-in-out infinite;
      }
      
      /* Stagger animation for children */
      .stagger-children > * {
        opacity: 0;
        animation: fadeInUp 0.6s ease forwards;
      }
      
      .stagger-children > *:nth-child(1) { animation-delay: 0.1s; }
      .stagger-children > *:nth-child(2) { animation-delay: 0.2s; }
      .stagger-children > *:nth-child(3) { animation-delay: 0.3s; }
      .stagger-children > *:nth-child(4) { animation-delay: 0.4s; }
      .stagger-children > *:nth-child(5) { animation-delay: 0.5s; }
      .stagger-children > *:nth-child(6) { animation-delay: 0.6s; }
      
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      
      /* Skill tag hover */
      .skill-tag {
        transition: all 0.2s ease;
        cursor: default;
      }
      
      .skill-tag:hover {
        transform: scale(1.05);
        background: var(--primary);
        color: white;
        border-color: var(--primary);
      }
      
      /* Button shine effect */
      .btn-shine {
        position: relative;
        overflow: hidden;
      }
      
      .btn-shine::after {
        content: '';
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: linear-gradient(
          to right,
          rgba(255, 255, 255, 0) 0%,
          rgba(255, 255, 255, 0.3) 50%,
          rgba(255, 255, 255, 0) 100%
        );
        transform: rotate(45deg) translateX(-100%);
        transition: transform 0.6s;
      }
      
      .btn-shine:hover::after {
        transform: rotate(45deg) translateX(100%);
      }
      
      /* Section divider with accent */
      .section-divider {
        position: relative;
      }
      
      .section-divider::before {
        content: '';
        position: absolute;
        bottom: -8px;
        left: 0;
        width: 60px;
        height: 3px;
        background: var(--accent);
        border-radius: 2px;
      }
      
      /* Responsive typography */
      @media (max-width: 640px) {
        h1 { font-size: 1.75rem !important; }
        h2 { font-size: 1.25rem !important; }
        h3 { font-size: 1rem !important; }
      }
      
      /* Project card styling */
      .project-card {
        background: rgba(255, 255, 255, 0.5);
        border-radius: 16px;
        padding: 1.5rem;
        border: 1px solid rgba(0, 0, 0, 0.05);
        transition: all 0.3s ease;
      }
      
      .dark .project-card {
        background: rgba(39, 39, 42, 0.5);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
      
      .project-card:hover {
        background: rgba(255, 255, 255, 0.9);
        transform: translateY(-4px);
        box-shadow: 0 20px 40px -15px rgba(29, 43, 80, 0.15);
        border-color: rgba(29, 43, 80, 0.1);
      }
      
      .dark .project-card:hover {
        background: rgba(39, 39, 42, 0.9);
        box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.4);
        border-color: rgba(251, 74, 40, 0.2);
      }
      
      /* Timeline for experience */
      .timeline-item {
        position: relative;
        padding-left: 2rem;
        border-left: 2px solid var(--primary);
      }
      
      .timeline-item::before {
        content: '';
        position: absolute;
        left: -6px;
        top: 0;
        width: 10px;
        height: 10px;
        background: var(--accent);
        border-radius: 50%;
      }
      
      /* Link underline animation */
      .link-underline {
        position: relative;
        text-decoration: none;
      }
      
      .link-underline::after {
        content: '';
        position: absolute;
        bottom: -2px;
        left: 0;
        width: 0;
        height: 2px;
        background: var(--accent);
        transition: width 0.3s ease;
      }
      
      .link-underline:hover::after {
        width: 100%;
      }
      
      /* Background decoration */
      .bg-decoration {
        position: fixed;
        width: 600px;
        height: 600px;
        border-radius: 50%;
        filter: blur(120px);
        opacity: 0.08;
        pointer-events: none;
        z-index: -1;
      }
      
      .bg-decoration-1 {
        top: -300px;
        right: -300px;
        background: var(--primary);
      }
      
      .bg-decoration-2 {
        bottom: -300px;
        left: -300px;
        background: var(--accent);
        opacity: 0.05;
      }
      
      /* Container queries for better responsiveness */
      @container (max-width: 400px) {
        .responsive-text {
          font-size: 0.875rem;
        }
      }
      
      /* Focus styles for accessibility */
      a:focus-visible,
      button:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
        border-radius: 4px;
      }
      
      /* Reduced motion support */
      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }
    </style>
  </head>
  <body
    class="bg-white text-gray-800 dark:bg-[#18181b] dark:text-gray-300 font-space-grotesk antialiased transition-colors duration-300"
  >
    <div id="app"></div>
    <script>
      let portfolioData = null;

      // Load portfolio data from JSON file
      async function loadPortfolioData() {
        try {
          const response = await fetch('./portfolio-data.json');
          if (!response.ok) {
            throw new Error('HTTP error! status: ' + response.status);
          }
          portfolioData = await response.json();
          return portfolioData;
        } catch (error) {
          console.error('Error loading portfolio data:', error);
          document.getElementById("app").innerHTML = '<div class="text-red-500 p-8">Error loading portfolio data. Please make sure portfolio-data.json exists.</div>';
          throw error;
        }
      }

      // getIconSVG: Inline SVGs for all icons used in the portfolio
      function getIconSVG(name) {
        const icons = {

          github:
            '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.012 8.012 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>',
          twitter:
            '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M12.6.75h2.454l-5.36 6.142L16 15.25h-4.937l-3.867-5.07-4.425 5.07H.316l5.733-6.57L0 .75h5.063l3.495 4.633L12.601.75Zm-.86 13.028h1.36L4.323 2.145H2.865l8.875 11.633Z"/></svg>',
          "arrow-up-right":
            '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M14 2.5a.5.5 0 0 0-.5-.5h-6a.5.5 0 0 0 0 1h4.793L2.146 13.146a.5.5 0 0 0 .708.708L13 3.707V8.5a.5.5 0 0 0 1 0v-6z"/></svg>',
          repo: '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" class="bi bi-github" viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.012 8.012 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>',
          sun: '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>',
          moon: '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>',
        };
        return icons[name] || "";
      }

      // Helper function to create section dividers
      function createSectionDivider(title) {
        return `
    <div class="section-divider mb-10">
      <h2 class="font-bold text-2xl md:text-3xl text-gray-900 dark:text-white">${title}</h2>
    </div>
  `;
      }

      // Helper function to generate initials from name
      function generateInitials(name) {
        const words = name.trim().split(" ");
        if (words.length === 1) {
          // If only one word, return first letter
          return words[0].charAt(0).toUpperCase();
        } else {
          // If 2 or more words, return first letter of first two words
          return words
            .slice(0, 2)
            .map((word) => word.charAt(0).toUpperCase())
            .join("");
        }
      }

      // Helper function to ensure URLs have proper protocol
      function ensureUrl(url) {
        if (!url) return url;
        // If URL doesn't start with http:// or https://, prepend https://
        if (!url.match(/^https?:\/\//)) {
          return `https://${url}`;
        }
        return url;
      }

      // Theme functions
      function setTheme(theme) {
        localStorage.setItem("theme", theme);
        if (theme === "dark") {
          document.documentElement.classList.add("dark");
        } else {
          document.documentElement.classList.remove("dark");
        }
        const toggle = document.getElementById("theme-toggle");
        if (toggle) {
          toggle.innerHTML = getIconSVG(theme === "dark" ? "sun" : "moon");
        }
      }

      function setupTheme() {
        const savedTheme = localStorage.getItem("theme");
        const prefersDark = window.matchMedia(
          "(prefers-color-scheme: dark)"
        ).matches;
        const defaultTheme = savedTheme || (prefersDark ? "dark" : "light");
        setTheme(defaultTheme);

        const toggle = document.getElementById("theme-toggle");
        if (toggle) {
          toggle.addEventListener("click", () => {
            const currentTheme = localStorage.getItem("theme") || "light";
            setTheme(currentTheme === "dark" ? "light" : "dark");
          });
        }
      }

      function setMetaTags(data) {
        const pageTitle = `${data.settings.name} - ${data.settings.title}`;
        const pageDescription = data.settings.summary;
        const pageImage = data.settings.profileImage;
        const pageUrl = window.location.href;

        // document title
        document.title = pageTitle;

        // Helper to create/update meta tags
        const createOrUpdateMeta = (
          property,
          content,
          isNameAttribute = false
        ) => {
          const attribute = isNameAttribute ? "name" : "property";
          let element = document.querySelector(
            `meta[${attribute}="${property}"]`
          );
          if (!element) {
            element = document.createElement("meta");
            element.setAttribute(attribute, property);
            document.head.appendChild(element);
          }
          element.setAttribute("content", content);
        };

        // Standard meta tags
        createOrUpdateMeta("description", pageDescription, true);

        // Open Graph (for Facebook, LinkedIn, etc.)
        createOrUpdateMeta("og:title", pageTitle);
        createOrUpdateMeta("og:description", pageDescription);
        createOrUpdateMeta("og:image", pageImage);
        createOrUpdateMeta("og:url", pageUrl);
        createOrUpdateMeta("og:type", "website");

        // Twitter Card
        createOrUpdateMeta("twitter:card", "summary_large_image", true);
        createOrUpdateMeta("twitter:title", pageTitle, true);
        createOrUpdateMeta("twitter:description", pageDescription, true);
        createOrUpdateMeta("twitter:image", pageImage, true);

        // Canonical link
        const canonical = document.getElementById("canonical-link");
        if (canonical) {
          canonical.setAttribute("href", pageUrl.split("#")[0]);
        }
      }

      // Main rendering function
      async function renderPortfolio() {
        try {
          // Load portfolio data from JSON file
          const data = await loadPortfolioData();

          // Meta tags immediately for better SEO
          setMetaTags(data);

          // --- Social Links ---
          let socialLinksHTML = "";
          if (data.sections.social && data.sections.social.enabled) {
            socialLinksHTML = data.sections.social.items
              .map(
                (item) => `
        <a href="${ensureUrl(
          item.url
        )}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-2 px-4 py-2 rounded-xl glass border border-gray-200 dark:border-gray-700 text-gray-600 dark:text-gray-400 hover:text-[#1d2b50] dark:hover:text-[#fb4a28] hover:border-[#1d2b50] dark:hover:border-[#fb4a28] hover:-translate-y-1 transition-all duration-300">
          ${getIconSVG(item.platform)}
          <span class="font-medium">${
            item.platform.charAt(0).toUpperCase() + item.platform.slice(1)
          }</span>
        </a>`
              )
              .join('');
          }

          // --- Header ---
          let headerHTML = "";
          if (data.navigation && data.navigation.enabled) {
            const navLinks = data.navigation.items
              .map(
                (item) => `
        <a href="${item.url}" class="link-underline px-4 py-2 text-sm font-medium rounded-full hover:bg-white/50 dark:hover:bg-gray-700/50 transition-all duration-300">${item.name}</a>
      `
              )
              .join("");

            headerHTML = `
        <header class="hidden md:flex fixed top-6 left-1/2 -translate-x-1/2 z-50">
          <nav class="glass flex items-center gap-2 shadow-xl rounded-full px-6 py-3">
            <div class="flex items-center justify-center w-9 h-9 bg-[#1d2b50] text-white rounded-full font-bold text-sm tracking-wider shadow-lg">
              ${generateInitials(data.settings.name)}
            </div>
            ${navLinks}
          </nav>
        </header>

        <!-- Mobile Sidebar -->
        <div id="mobile-sidebar" class="fixed top-0 left-0 h-full w-72 glass shadow-2xl transform -translate-x-full transition-transform duration-300 ease-out z-50" role="dialog" aria-modal="true" aria-hidden="true" tabindex="-1">
          <div class="p-8 pt-24">
            <div class="flex items-center gap-3 mb-8 pb-6 border-b border-gray-200 dark:border-gray-700">
              <div class="flex items-center justify-center w-12 h-12 bg-[#1d2b50] text-white rounded-full font-bold text-lg shadow-lg">
                ${generateInitials(data.settings.name)}
              </div>
              <div>
                <p class="font-semibold text-gray-900 dark:text-white">${data.settings.name}</p>
                <p class="text-sm text-gray-500">${data.settings.title}</p>
              </div>
            </div>
            <nav class="flex flex-col gap-2 stagger-children">
              ${data.navigation.items
                .map(
                  (item) => `
                <a href="${item.url}" class="px-4 py-3 text-lg font-medium rounded-xl hover:bg-[#1d2b50]/5 hover:text-[#1d2b50] dark:hover:bg-[#fb4a28]/10 dark:hover:text-[#fb4a28] transition-all duration-300">${item.name}</a>
              `
                )
                .join("")}
            </nav>
          </div>
        </div>

        <!-- Hamburger Menu -->
        <button id="hamburger-menu" class="md:hidden fixed top-4 left-4 z-[60] p-3 rounded-xl glass shadow-lg hover:scale-105 transition-transform duration-300" aria-label="Open menu" aria-controls="mobile-sidebar" aria-expanded="false">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" class="text-gray-700 dark:text-gray-300">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>
      `;
          }

          // --- CTA Buttons ---
          let ctaButtonsHTML = "";
          if (data.sections.hero && data.sections.hero.enabled) {
            ctaButtonsHTML = data.sections.hero.ctaButtons
              .map(
                (btn, index) => `

          document.getElementById("app").innerHTML = content;

          // JSON-LD Person schema
          try {
            const personSchema = {
              "@context": "https://schema.org",
              "@type": "Person",
              name: data.settings.name,
              jobTitle: data.settings.title,
              description: data.settings.summary,
              image: data.settings.profileImage,
              url: window.location.href,
              sameAs: (data.sections.social?.items || []).map((s) =>
                ensureUrl(s.url)
              ),
              address: {
                "@type": "PostalAddress",
                streetAddress: data.settings.location,
              },
            };
            const ld = document.createElement("script");
            ld.type = "application/ld+json";
            ld.textContent = JSON.stringify(personSchema);
            document.head.appendChild(ld);
          } catch (e) {
            console.warn("JSON-LD injection failed", e);
          }
          document.querySelectorAll('a[href^="#"]').forEach((anchor) => {
            anchor.addEventListener("click", function (e) {
              e.preventDefault();
              const targetId = this.getAttribute("href");
              if (targetId === "#") return;
              const targetElement = document.querySelector(targetId);
              if (targetElement) {
                targetElement.scrollIntoView({
                  behavior: "smooth",
                });
              }
            });
          });

          const hamburgerMenu = document.getElementById("hamburger-menu");
          const sidebar = document.getElementById("mobile-sidebar");
          const mainContent = document.querySelector("main");

          // Guard against missing elements when navigation is disabled
          if (hamburgerMenu && sidebar) {
            function openSidebar() {
              sidebar.classList.remove("-translate-x-full");
              hamburgerMenu.setAttribute("aria-expanded", "true");
              sidebar.setAttribute("aria-hidden", "false");
              sidebar.focus();
            }

            function closeSidebar() {
              sidebar.classList.add("-translate-x-full");
              hamburgerMenu.setAttribute("aria-expanded", "false");
              sidebar.setAttribute("aria-hidden", "true");
            }

            hamburgerMenu.addEventListener("click", () => {
              const isOpen = !sidebar.classList.contains("-translate-x-full");
              if (isOpen) {
                closeSidebar();
              } else {
                openSidebar();
              }
            });

            sidebar.querySelectorAll("a").forEach((link) => {
              link.addEventListener("click", () => {
                sidebar.classList.add("-translate-x-full");
              });
            });

            document.addEventListener("click", (event) => {
              if (
                !sidebar.contains(event.target) &&
                !hamburgerMenu.contains(event.target)
              ) {
                closeSidebar();
              }
            });

            document.addEventListener("keydown", (event) => {
              if (event.key === "Escape") {
                closeSidebar();
                hamburgerMenu.focus();
              }
            });
          }
        } catch (err) {
          document.getElementById(
            "app"
          ).innerHTML = `<div class="text-red-500 p-8">${err}</div>`;
          console.error(err);
        }

`;
