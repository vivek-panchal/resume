<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>

    <script src="https://cdn.tailwindcss.com"></script>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-C8D6RK2RMR"></script>

    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ["Space Grotesk", "sans-serif"],
              mono: ["ui-monospace", "SFMono-Regular", "Menlo", "Monaco", "Consolas", "monospace"],
            },
            colors: {
              background: "#09090b", // Zinc 950
              surface: "#18181b",    // Zinc 900
              surfaceHighlight: "#27272a", // Zinc 800
              primary: "#3b82f6",    // Blue 500
              accent: "#f97316",     // Orange 500
              textMain: "#fafafa",   // Zinc 50
              textMuted: "#a1a1aa",  // Zinc 400
            },
            animation: {
              'blob': 'blob 7s infinite',
              'fade-up': 'fadeUp 0.5s ease-out forwards',
            },
            keyframes: {
              blob: {
                '0%': { transform: 'translate(0px, 0px) scale(1)' },
                '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                '100%': { transform: 'translate(0px, 0px) scale(1)' },
              },
              fadeUp: {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              }
            },
          },
        },
      };
    </script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    
    <style>
      /* Base Styles */
      body {
        font-family: 'Space Grotesk', sans-serif;
        background-color: #fafafa;
        color: #18181b;
        transition: background-color 0.3s, color 0.3s;
      }
      
      .dark body {
        background-color: #09090b;
        color: #fafafa;
      }

      /* Noise Texture */
      .bg-noise {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: -1;
        opacity: 0.05;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      /* Scroll Animation Utilities */
      .reveal {
        opacity: 0;
        transform: translateY(30px);
        transition: all 0.8s cubic-bezier(0.5, 0, 0, 1);
      }
      
      .reveal.active {
        opacity: 1;
        transform: translateY(0);
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #a1a1aa;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #71717a;
      }

      /* Utility Classes */
      .glass-panel {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(0, 0, 0, 0.08);
      }
      
      .dark .glass-panel {
        background: rgba(24, 24, 27, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      /* Gradient Text */
      .text-gradient {
        background-clip: text;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-image: linear-gradient(to right, #3b82f6, #8b5cf6, #f97316);
      }
      
      /* Card Hover Glow */
      .card-hover {
        transition: all 0.3s ease;
      }
      .card-hover:hover {
        transform: translateY(-4px);
        box-shadow: 0 10px 30px -10px rgba(59, 130, 246, 0.15);
        border-color: rgba(59, 130, 246, 0.3);
      }

      /* Terminal Code Styling */
      .code-line {
        font-family: 'ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', monospace;
        display: flex;
        gap: 12px;
      }
      .line-num {
        color: #52525b;
        user-select: none;
      }
    </style>
  </head>
  <body class="antialiased selection:bg-orange-500 selection:text-white">
    
    <div class="bg-noise"></div>
    
    <div class="fixed top-0 left-0 w-full h-full overflow-hidden -z-20 pointer-events-none">
      <div class="absolute top-0 left-1/4 w-96 h-96 bg-blue-500/20 rounded-full blur-[100px] animate-blob"></div>
      <div class="absolute bottom-0 right-1/4 w-96 h-96 bg-orange-500/10 rounded-full blur-[100px] animate-blob animation-delay-2000"></div>
    </div>

    <button id="theme-toggle" class="fixed top-6 right-6 z-50 p-3 rounded-full glass-panel shadow-lg hover:scale-110 transition-transform text-gray-800 dark:text-gray-200">

    </button>

    <nav class="fixed top-6 left-1/2 -translate-x-1/2 z-40 hidden md:block">
      <div id="nav-container" class="glass-panel rounded-full px-6 py-3 flex gap-8 text-sm font-medium text-gray-600 dark:text-gray-300 shadow-xl shadow-black/5">
        </div>
    </nav>

    <button id="mobile-menu-btn" class="md:hidden fixed top-6 left-6 z-50 p-3 rounded-full glass-panel text-gray-800 dark:text-gray-200">
       <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
    </button>
    <div id="mobile-menu" class="fixed inset-0 bg-background/95 backdrop-blur-xl z-40 transform -translate-x-full transition-transform duration-300 flex items-center justify-center">
        <div id="mobile-nav-links" class="flex flex-col gap-6 text-2xl font-bold text-center"></div>
    </div>

    <main id="app" class="max-w-5xl mx-auto px-6 py-24 md:py-32 flex flex-col gap-32">
       <div class="flex items-center justify-center h-[50vh]">
         <div class="animate-pulse text-xl text-gray-400 font-mono">Loading System...</div>
       </div>
    </main>

    <footer class="border-t border-gray-200 dark:border-gray-800 py-12 mt-12 bg-white/50 dark:bg-black/20 backdrop-blur-sm">
        <div class="max-w-5xl mx-auto px-6 text-center">
            <p id="footer-text" class="text-gray-500 text-sm"></p>
        </div>
    </footer>

    <script>
      // --- Helper Functions ---
      
      const getIcon = (name) => {
        const icons = {
           linkedin: '<svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/></svg>',
           github: '<svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>',
           leetcode: '<svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M13.483 0a1.374 1.374 0 0 0-.961.438L7.116 6.226l-3.854 4.126a5.266 5.266 0 0 0-1.209 2.104 5.35 5.35 0 0 0-.125.513 5.527 5.527 0 0 0 .062 2.362 5.83 5.83 0 0 0 .349 1.017 5.938 5.938 0 0 0 1.271 1.818l4.277 4.193.039.038c2.248 2.165 5.852 2.133 8.063-.074l2.396-2.392c.54-.54.54-1.414.003-1.955a1.378 1.378 0 0 0-1.951-.003l-2.396 2.392a3.021 3.021 0 0 1-4.205.038l-.02-.019-4.276-4.193c-.652-.64-.972-1.469-.948-2.263a2.68 2.68 0 0 1 .066-.523 2.545 2.545 0 0 1 .619-1.164L9.13 8.114c1.058-1.134 3.204-1.27 4.43-.278l3.501 2.831c.593.48 1.461.387 1.94-.207a1.384 1.384 0 0 0-.207-1.943l-3.5-2.831c-.8-.647-1.766-1.045-2.774-1.202l2.015-2.158A1.384 1.384 0 0 0 13.483 0zm-2.866 12.815a1.38 1.38 0 0 0-1.38 1.382 1.38 1.38 0 0 0 1.38 1.382H20.79a1.38 1.38 0 0 0 1.38-1.382 1.38 1.38 0 0 0-1.38-1.382z"/></svg>',
           link: '<svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>'
        };
        return icons[name] || icons.link;
      };

      // --- Main Logic ---

      async function loadPortfolio() {
        try {
          const res = await fetch('./portfolio-data.json');
          if (!res.ok) throw new Error("Could not load data");
          const data = await res.json();
          renderApp(data);
          setupScrollObserver();
        } catch (error) {
          console.error(error);
          document.getElementById('app').innerHTML = `<div class="text-red-500 text-center">Error loading portfolio data. Please ensure portfolio-data.json is present.</div>`;
        }
      }

      function renderApp(data) {
        // 1. Navigation
        const navItems = data.sections.navigation.items.map(item => 
          `<a href="${item.url}" class="hover:text-blue-600 dark:hover:text-blue-400 transition-colors">${item.name}</a>`
        ).join('');
        
        document.getElementById('nav-container').innerHTML = navItems;
        
        const mobileNavItems = data.sections.navigation.items.map(item => 
          `<a href="${item.url}" class="mobile-link hover:text-orange-500 transition-colors" onclick="toggleMobileMenu()">${item.name}</a>`
        ).join('');
        document.getElementById('mobile-nav-links').innerHTML = mobileNavItems;

        // 2. Main Sections Construction
        const { hero, about, experience, projects, education, achievements, contact, social } = data.sections;
        const { name, title, summary, profileImage, location } = data.settings;

        let contentHTML = '';

        // --- HERO SECTION (Terminal Style) ---
        contentHTML += `
          <section id="home" class="grid grid-cols-1 lg:grid-cols-2 gap-12 items-center min-h-[60vh] lg:min-h-[80vh] reveal active">
            <div class="space-y-6">
               <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full border border-orange-500/20 bg-orange-500/10 text-orange-600 dark:text-orange-400 text-xs font-mono font-medium">
                 <span class="relative flex h-2 w-2">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-orange-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-orange-500"></span>
                  </span>
                 Available for work
               </div>
               <h1 class="text-5xl md:text-7xl font-bold tracking-tight text-gray-900 dark:text-white">
                 Hi, I'm <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-orange-500">${name}</span>
               </h1>
               <h2 class="text-2xl text-gray-500 dark:text-gray-400 font-medium">${title}</h2>
               <p class="text-lg text-gray-600 dark:text-gray-400 leading-relaxed max-w-xl">
                 ${summary}
               </p>
               
               <div class="flex flex-wrap gap-4 pt-4">
                 ${hero.ctaButtons.map((btn, idx) => `
                   <a href="${btn.url}" target="_blank" class="${idx === 0 ? 
                     'bg-gray-900 dark:bg-white text-white dark:text-gray-900 hover:bg-gray-800 dark:hover:bg-gray-200' : 
                     'bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 hover:border-blue-500 dark:hover:border-blue-400'} 
                     px-6 py-3 rounded-xl font-medium transition-all duration-300 shadow-sm hover:shadow-md flex items-center gap-2">
                     ${btn.text}
                     ${idx === 0 ? '<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>' : ''}
                   </a>
                 `).join('')}
               </div>
               
               <div class="flex gap-4 pt-4">
                 ${social.items.map(s => `
                   <a href="${s.url}" target="_blank" class="text-gray-400 hover:text-gray-900 dark:hover:text-white transition-colors p-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg">
                     ${getIcon(s.platform)}
                   </a>
                 `).join('')}
               </div>
            </div>

            <div class="order-1 lg:order-2 relative group perspective-1000 hidden lg:block">
               <div class="absolute -inset-1 bg-gradient-to-r from-blue-600 to-orange-600 rounded-2xl blur opacity-20 group-hover:opacity-40 transition duration-1000"></div>
               <div class="relative bg-gray-900 dark:bg-gray-900 rounded-2xl border border-gray-700 shadow-2xl overflow-hidden transform transition-transform group-hover:rotate-1">
                  <div class="flex items-center gap-2 px-4 py-3 border-b border-gray-700 bg-gray-950">
                    <div class="w-3 h-3 rounded-full bg-red-500"></div>
                    <div class="w-3 h-3 rounded-full bg-yellow-500"></div>
                    <div class="w-3 h-3 rounded-full bg-green-500"></div>
                    <div class="ml-2 text-xs text-gray-400 font-mono">vivek@dev ~</div>
                  </div>
                  <div class="p-6 font-mono text-sm overflow-hidden text-gray-100">
                    <div class="code-line"><span class="line-num text-gray-500">1</span> <span class="text-purple-400">class</span> <span class="text-yellow-300">Developer</span> <span class="text-gray-300">{</span></div>
                    <div class="code-line"><span class="line-num text-gray-500">2</span> &nbsp;&nbsp;<span class="text-blue-400">constructor</span><span class="text-gray-300">()</span> <span class="text-gray-300">{</span></div>
                    <div class="code-line"><span class="line-num text-gray-500">3</span> &nbsp;&nbsp;&nbsp;&nbsp;<span class="text-red-400">this</span><span class="text-gray-300">.</span>name <span class="text-gray-300">=</span> <span class="text-green-400">"${name}"</span><span class="text-gray-300">;</span></div>
                    <div class="code-line"><span class="line-num text-gray-500">4</span> &nbsp;&nbsp;&nbsp;&nbsp;<span class="text-red-400">this</span><span class="text-gray-300">.</span>role <span class="text-gray-300">=</span> <span class="text-green-400">"${title}"</span><span class="text-gray-300">;</span></div>
                    <div class="code-line"><span class="line-num text-gray-500">5</span> &nbsp;&nbsp;&nbsp;&nbsp;<span class="text-red-400">this</span><span class="text-gray-300">.</span>location <span class="text-gray-300">=</span> <span class="text-green-400">"${location}"</span><span class="text-gray-300">;</span></div>
                    <div class="code-line"><span class="line-num text-gray-500">6</span> &nbsp;&nbsp;<span class="text-gray-300">}</span></div>
                    <div class="code-line"><span class="line-num text-gray-500">7</span> </div>
                    <div class="code-line"><span class="line-num text-gray-500">8</span> &nbsp;&nbsp;<span class="text-blue-400">skills</span><span class="text-gray-300">()</span> <span class="text-gray-300">{</span></div>
                    <div class="code-line"><span class="line-num text-gray-500">9</span> &nbsp;&nbsp;&nbsp;&nbsp;<span class="text-purple-400">return</span> <span class="text-gray-300">[</span></div>
                    <div class="code-line"><span class="line-num text-gray-500">10</span>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="text-green-400">"Node.js"</span><span class="text-gray-300">,</span> <span class="text-green-400">"Postgres"</span><span class="text-gray-300">,</span></div>
                    <div class="code-line"><span class="line-num text-gray-500">11</span>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="text-green-400">"AWS"</span><span class="text-gray-300">,</span> <span class="text-green-400">"Docker"</span></div>
                    <div class="code-line"><span class="line-num text-gray-500">12</span>&nbsp;&nbsp;&nbsp;&nbsp;<span class="text-gray-300">];</span></div>
                    <div class="code-line"><span class="line-num text-gray-500">13</span>&nbsp;&nbsp;<span class="text-gray-300">}</span></div>
                    <div class="code-line"><span class="line-num text-gray-500">14</span><span class="text-gray-300">}</span></div>
                  </div>
               </div>
            </div>
          </section>
        `;

        // --- SKILLS & ABOUT (Bento Grid) ---
        if (about.enabled) {
          contentHTML += `
            <section id="about" class="reveal">
              <h3 class="text-xl font-bold mb-8 flex items-center gap-3">
                <span class="w-8 h-[2px] bg-orange-500"></span>
                Tech Stack
              </h3>
              <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="glass-panel p-6 rounded-2xl border-l-4 border-l-blue-500">
                   <h4 class="text-lg font-semibold mb-4 text-gray-800 dark:text-white">Technologies</h4>
                   <div class="flex flex-wrap gap-2">
                     ${about.skills.items.map(skill => `
                       <span class="px-3 py-1 text-sm bg-gray-100 dark:bg-gray-800 text-gray-700 dark:text-gray-300 rounded-md border border-gray-200 dark:border-gray-700 hover:border-blue-500 hover:text-blue-500 transition-colors cursor-default">
                         ${skill}
                       </span>
                     `).join('')}
                   </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                   <div class="glass-panel p-6 rounded-2xl flex flex-col justify-center items-center text-center">
                      <span class="text-4xl font-bold text-blue-500 mb-1">1.5+</span>
                      <span class="text-xs text-gray-500 uppercase tracking-wider">Years Exp</span>
                   </div>
                   <div class="glass-panel p-6 rounded-2xl flex flex-col justify-center items-center text-center">
                      <span class="text-4xl font-bold text-orange-500 mb-1">900+</span>
                      <span class="text-xs text-gray-500 uppercase tracking-wider">LeetCode</span>
                   </div>
                   <div class="col-span-2 glass-panel p-6 rounded-2xl flex items-center justify-between">
                      <div>
                        <div class="text-sm text-gray-500">Current Location</div>
                        <div class="font-semibold text-lg dark:text-white">${location}</div>
                      </div>
                      <div class="text-right">
                         <div class="text-sm text-gray-500">Focus</div>
                         <div class="font-semibold text-lg text-blue-500">Backend Systems</div>
                      </div>
                   </div>
                </div>
              </div>
            </section>
          `;
        }

        // --- EXPERIENCE (Vertical Timeline) ---
        if (experience.enabled) {
          contentHTML += `
            <section id="experience" class="reveal">
              <h3 class="text-xl font-bold mb-8 flex items-center gap-3">
                <span class="w-8 h-[2px] bg-orange-500"></span>
                Experience
              </h3>
              <div class="space-y-8 relative border-l-2 border-gray-200 dark:border-gray-800 ml-3 md:ml-6">
                 ${experience.items.map(job => `
                   <div class="relative pl-8 md:pl-12 group">
                     <span class="absolute -left-[9px] top-2 h-4 w-4 rounded-full bg-white dark:bg-gray-900 border-2 border-blue-500 group-hover:scale-125 transition-transform"></span>
                     
                     <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-1 mb-2">
                       <h4 class="text-xl font-bold text-gray-900 dark:text-white group-hover:text-blue-500 transition-colors">${job.position}</h4>
                       <span class="text-sm font-mono text-gray-500 bg-gray-100 dark:bg-gray-800 px-2 py-1 rounded">${job.period}</span>
                     </div>
                     <div class="text-lg text-gray-700 dark:text-gray-300 font-medium mb-3">${job.company}</div>
                     <p class="text-gray-600 dark:text-gray-400 leading-relaxed text-sm whitespace-pre-line border-l-2 border-transparent hover:border-gray-300 dark:hover:border-gray-700 pl-4 transition-colors">
                       ${job.description}
                     </p>
                   </div>
                 `).join('')}
              </div>
            </section>
          `;
        }

        // --- PROJECTS (Grid Cards) ---
        if (projects.enabled) {
          contentHTML += `
            <section id="projects" class="reveal">
              <h3 class="text-xl font-bold mb-8 flex items-center gap-3">
                <span class="w-8 h-[2px] bg-orange-500"></span>
                Featured Projects
              </h3>
              <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                ${projects.items.map(proj => `
                  <div class="glass-panel p-6 rounded-2xl card-hover flex flex-col h-full">
                    <div class="flex justify-between items-start mb-4">
                      <div class="p-2 rounded-lg bg-gray-100 dark:bg-gray-800 text-gray-900 dark:text-white">
                         <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                      </div>
                      <div class="flex gap-3">
                        ${proj.repoUrl ? `<a href="${proj.repoUrl}" target="_blank" class="text-gray-400 hover:text-gray-900 dark:hover:text-white">${getIcon('github')}</a>` : ''}
                        ${proj.previewUrl ? `<a href="${proj.previewUrl}" target="_blank" class="text-gray-400 hover:text-blue-500">${getIcon('link')}</a>` : ''}
                      </div>
                    </div>
                    
                    <h4 class="text-xl font-bold text-gray-900 dark:text-white mb-2">${proj.title}</h4>
                    <p class="text-gray-600 dark:text-gray-400 text-sm mb-6 flex-grow leading-relaxed">
                      ${proj.description}
                    </p>
                    
                    <div class="flex flex-wrap gap-2 mt-auto pt-4 border-t border-gray-100 dark:border-gray-800">
                      ${proj.tags.map(tag => `
                        <span class="text-xs font-mono text-gray-500">#${tag}</span>
                      `).join('')}
                    </div>
                  </div>
                `).join('')}
              </div>
            </section>
          `;
        }

        // --- EDUCATION ---
        if (education && education.enabled) {
          contentHTML += `
            <section id="education" class="reveal">
              <h3 class="text-xl font-bold mb-8 flex items-center gap-3">
                <span class="w-8 h-[2px] bg-orange-500"></span>
                Education
              </h3>
              <div class="space-y-4">
                ${education.items.map(item => `
                  <div class="glass-panel p-6 rounded-2xl flex flex-col sm:flex-row sm:items-center justify-between gap-4 transition-all hover:border-orange-500/30">
                    <div>
                      <h4 class="text-lg font-bold text-gray-900 dark:text-white">${item.institution}</h4>
                      <p class="text-gray-600 dark:text-gray-400 text-sm">${item.degree}</p>
                    </div>
                    <span class="text-sm font-mono text-gray-500 bg-gray-100 dark:bg-gray-800 px-3 py-1 rounded-full whitespace-nowrap">
                      ${item.period}
                    </span>
                  </div>
                `).join('')}
              </div>
            </section>
          `;
        }

        // --- ACHIEVEMENTS ---
        if (achievements.enabled) {
          contentHTML += `
            <section id="achievements" class="reveal">
              <h3 class="text-xl font-bold mb-6 flex items-center gap-3">
                <span class="w-8 h-[2px] bg-orange-500"></span>
                Achievements
              </h3>
              <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                 ${achievements.items.map(item => `
                   <div class="flex items-start gap-4 p-4 rounded-xl border border-gray-100 dark:border-gray-800 hover:bg-gray-50 dark:hover:bg-gray-800/50 transition-colors">
                      <div class="text-yellow-500 mt-1">
                        <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                      </div>
                      <div>
                        <h4 class="font-bold text-gray-900 dark:text-white text-sm">${item.title}</h4>
                        <p class="text-xs text-gray-500 mt-1">${item.description}</p>
                      </div>
                   </div>
                 `).join('')}
              </div>
            </section>
          `;
        }

        // --- CONTACT ---
        contentHTML += `
           <section id="contact" class="reveal py-12">
             <div class="glass-panel rounded-3xl p-8 md:p-12 text-center relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-blue-500 to-orange-500"></div>
                <h2 class="text-3xl md:text-4xl font-bold mb-6 text-gray-900 dark:text-white">Let's Build Something Scalable</h2>
                <p class="text-gray-600 dark:text-gray-400 mb-8 max-w-lg mx-auto">
                   I'm currently open to new opportunities. Whether you have a question or just want to say hi, I'll try my best to get back to you!
                </p>
                <a href="mailto:${contact.email}" class="inline-flex items-center gap-2 bg-gray-900 dark:bg-white text-white dark:text-gray-900 px-8 py-4 rounded-full font-bold text-lg hover:scale-105 transition-transform">
                   <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                   Say Hello
                </a>
             </div>
           </section>
        `;

        // Render to DOM
        document.getElementById('app').innerHTML = contentHTML;
        document.getElementById('footer-text').innerText = data.footer.enabled ? data.footer.copyright : `© ${new Date().getFullYear()} ${name}.`;
      }

      // --- Animation & UX Utils ---

      function setupScrollObserver() {
        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              entry.target.classList.add('active');
            }
          });
        }, { threshold: 0.1 });

        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
      }

      // --- Theme Handling ---
      const themeToggle = document.getElementById('theme-toggle');
      const sunIcon = document.getElementById('sun-icon');
      const moonIcon = document.getElementById('moon-icon');
      
      const userTheme = localStorage.getItem('theme');
      const systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches;
      
      const toggleTheme = (isDark) => {
        if (isDark) {
          document.documentElement.classList.add('dark');
          sunIcon.classList.remove('hidden');
          moonIcon.classList.add('hidden');
          localStorage.setItem('theme', 'dark');
        } else {
          document.documentElement.classList.remove('dark');
          sunIcon.classList.add('hidden');
          moonIcon.classList.remove('hidden');
          localStorage.setItem('theme', 'light');
        }
      };
      
      // Initial check
      if (userTheme === 'dark' || (!userTheme && systemTheme)) {
        toggleTheme(true);
      } else {
        toggleTheme(false);
      }
      
      themeToggle.addEventListener('click', () => {
        const isDark = document.documentElement.classList.contains('dark');
        toggleTheme(!isDark);
      });

      // --- Mobile Menu ---
      const mobileMenuBtn = document.getElementById('mobile-menu-btn');
      const mobileMenu = document.getElementById('mobile-menu');
      
      function toggleMobileMenu() {
        const isOpen = !mobileMenu.classList.contains('-translate-x-full');
        if (isOpen) {
          mobileMenu.classList.add('-translate-x-full');
        } else {
          mobileMenu.classList.remove('-translate-x-full');
        }
      }
      
      mobileMenuBtn.addEventListener('click', toggleMobileMenu);

      // Start App
      document.addEventListener('DOMContentLoaded', loadPortfolio);

    </script>
  </body>
</html>
