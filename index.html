    <style>
      /* Base Styles */
      body {
        font-family: 'Space Grotesk', sans-serif;
        background-color: #f4f4f5;
        color: #111827;
        transition: background-color 0.3s, color 0.3s;
      }
      
      .dark body {
        background-color: #09090b;
        color: #fafafa;
      }

      /* Noise Texture */
      .bg-noise {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: -1;
        opacity: 0.03;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      /* Scroll Animation Utilities */
      .reveal {
        opacity: 0;
        transform: translateY(30px);
        transition: all 0.8s cubic-bezier(0.5, 0, 0, 1);
      }
      
      .reveal.active {
        opacity: 1;
        transform: translateY(0);
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #a1a1aa;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #71717a;
      }

      /* Utility Classes */
      .glass-panel {
        background: rgba(255, 255, 255, 0.82);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(15, 23, 42, 0.08);
        box-shadow: 0 10px 30px -20px rgba(15, 23, 42, 0.35);
      }
      
      .dark .glass-panel {
        background: rgba(15, 23, 42, 0.72);
        border: 1px solid rgba(148, 163, 184, 0.2);
        box-shadow: 0 16px 40px -24px rgba(2, 6, 23, 0.9);
      }

      /* Gradient Text */
      .text-gradient {
        background-clip: text;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-image: linear-gradient(to right, #3b82f6, #8b5cf6, #f97316);
      }
      
      /* Card Hover Glow */
      .card-hover {
        transition: all 0.3s ease;
      }
      .card-hover:hover {
        transform: translateY(-3px);
        box-shadow: 0 14px 28px -18px rgba(17, 24, 39, 0.4);
        border-color: rgba(17, 24, 39, 0.22);
      }
      .section-title {
        letter-spacing: 0.02em;
        font-size: clamp(1.15rem, 2vw, 1.5rem);
      }
      .nav-link-active {
        color: #111827 !important;
        font-weight: 700;
      }
      .dark .nav-link-active {
        color: #f4f4f5 !important;
      }
      .subtle-grid {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: -2;
        background-image:
          linear-gradient(rgba(24, 24, 27, 0.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(24, 24, 27, 0.035) 1px, transparent 1px);
        background-size: 36px 36px;
      }
      .dark .subtle-grid {
        background-image:
          linear-gradient(rgba(244, 244, 245, 0.045) 1px, transparent 1px),
          linear-gradient(90deg, rgba(244, 244, 245, 0.045) 1px, transparent 1px);

      .section-shell {
        border-radius: 1.25rem;
        border: 1px solid rgba(17, 24, 39, 0.08);

      .kicker {

        letter-spacing: 0.14em;
        color: #52525b;
        font-weight: 700;
      }
      .dark .kicker { color: #a1a1aa; }
      .soft-divider {
        height: 1px;
        width: 100%;
        background: linear-gradient(to right, transparent, rgba(63, 63, 70, 0.25), transparent);
      }
      .stat-value {

    <script>

           github: '<svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>',
           leetcode: '<svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M13.483 0a1.374 1.374 0 0 0-.961.438L7.116 6.226l-3.854 4.126a5.266 5.266 0 0 0-1.209 2.104 5.35 5.35 0 0 0-.125.513 5.527 5.527 0 0 0 .062 2.362 5.83 5.83 0 0 0 .349 1.017 5.938 5.938 0 0 0 1.271 1.818l4.277 4.193.039.038c2.248 2.165 5.852 2.133 8.063-.074l2.396-2.392c.54-.54.54-1.414.003-1.955a1.378 1.378 0 0 0-1.951-.003l-2.396 2.392a3.021 3.021 0 0 1-4.205.038l-.02-.019-4.276-4.193c-.652-.64-.972-1.469-.948-2.263a2.68 2.68 0 0 1 .066-.523 2.545 2.545 0 0 1 .619-1.164L9.13 8.114c1.058-1.134 3.204-1.27 4.43-.278l3.501 2.831c.593.48 1.461.387 1.94-.207a1.384 1.384 0 0 0-.207-1.943l-3.5-2.831c-.8-.647-1.766-1.045-2.774-1.202l2.015-2.158A1.384 1.384 0 0 0 13.483 0zm-2.866 12.815a1.38 1.38 0 0 0-1.38 1.382 1.38 1.38 0 0 0 1.38 1.382H20.79a1.38 1.38 0 0 0 1.38-1.382 1.38 1.38 0 0 0-1.38-1.382z"/></svg>',

      // --- Main Logic ---

      async function loadPortfolio() {
        try {
          const res = await fetch('./portfolio-data.json');
          if (!res.ok) throw new Error("Could not load data");
          const data = await res.json();
          renderApp(data);
          setupScrollObserver();
          setupActiveNav();
        } catch (error) {
          console.error(error);
          document.getElementById('app').innerHTML = `<div class="text-red-500 text-center">Error loading portfolio data. Please ensure portfolio-data.json is present.</div>`;
        }
      }

      function renderApp(data) {
        // 1. Navigation
        const navItems = data.sections.navigation.items.map(item => 
          `<a href="${item.url}" class="nav-link hover:text-blue-600 dark:hover:text-blue-400 transition-colors">${item.name}</a>`
        ).join('');
        
        document.getElementById('nav-container').innerHTML = navItems;
        
        const mobileNavItems = data.sections.navigation.items.map(item => 
          `<a href="${item.url}" class="mobile-link hover:text-orange-500 transition-colors" onclick="toggleMobileMenu()">${item.name}</a>`
        ).join('');
        document.getElementById('mobile-nav-links').innerHTML = mobileNavItems;

        // 2. Main Sections Construction
        const { hero, about, experience, projects, education, achievements, contact, social } = data.sections;
        const { name, title, summary, location } = data.settings;

        const renderExperienceDescription = (description) => {
          if (Array.isArray(description)) {
            return `
              <ul class="list-disc marker:text-orange-500 text-gray-600 dark:text-gray-400 leading-relaxed text-sm pl-5 space-y-2">
                ${description.map(point => `<li>${point}</li>`).join('')}
              </ul>
            `;
          }
          if (typeof description === 'string') {
            const parts = description.split(/\n|•/).map(part => part.trim()).filter(Boolean);
            if (parts.length > 1) {
              return `
                <ul class="list-disc marker:text-orange-500 text-gray-600 dark:text-gray-400 leading-relaxed text-sm pl-5 space-y-2">
                  ${parts.map(point => `<li>${point}</li>`).join('')}
                </ul>
              `;
            }
            return `<p class="text-gray-600 dark:text-gray-400 leading-relaxed text-sm">${description}</p>`;
          }
          return '';
        };

        const monthMap = {
          jan: 0, feb: 1, mar: 2, apr: 3, may: 4, jun: 5,
          jul: 6, aug: 7, sep: 8, oct: 9, nov: 10, dec: 11
        };

        const parseMonthYear = (raw) => {
          if (!raw) return null;
          const trimmed = raw.trim().toLowerCase();
          if (trimmed === 'present') {
            const now = new Date();
            return { year: now.getFullYear(), month: now.getMonth() };
          }
          const parts = trimmed.split(/\s+/);
          if (parts.length < 2) return null;
          const month = monthMap[parts[0].slice(0, 3)];
          const year = Number(parts[1]);
          if (month === undefined || Number.isNaN(year)) return null;
          return { year, month };
        };

        const monthsBetweenInclusive = (start, end) => {
          if (!start || !end) return 0;
          const startIndex = start.year * 12 + start.month;
          const endIndex = end.year * 12 + end.month;
          return Math.max(0, endIndex - startIndex + 1);
        };

        const getExperienceYears = (items) => {
          const totalMonths = (items || []).reduce((sum, item) => {
            const [startRaw, endRaw] = (item.period || '').split('-').map(part => part.trim());
            const start = parseMonthYear(startRaw);
            const end = parseMonthYear(endRaw);
            return sum + monthsBetweenInclusive(start, end);
          }, 0);
          const years = totalMonths / 12;
          return years >= 1 ? `${years.toFixed(1)}+` : '<1';
        };

        const getLeetCodeSolved = (achievementsList) => {
          const matches = (achievementsList || [])
            .map(item => `${item.title || ''} ${item.description || ''}`)
            .map(text => text.match(/(\d+)\+\s*LeetCode/i))
            .filter(Boolean);
          return matches.length ? `${matches[0][1]}+` : '900+';
        };

        const experienceYears = getExperienceYears(experience.items);
        const leetCodeSolved = getLeetCodeSolved(achievements.items);

        let contentHTML = '';

        // --- HERO SECTION ---
        contentHTML += `
          <section id="home" class="grid grid-cols-1 lg:grid-cols-3 gap-8 md:gap-10 items-start min-h-[56vh] lg:min-h-[70vh] reveal active">
            <div class="space-y-6 lg:col-span-2">
               <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full border border-zinc-300 dark:border-zinc-700 bg-white/60 dark:bg-zinc-900 text-zinc-700 dark:text-zinc-300 text-xs font-mono font-medium">
                 <span class="relative flex h-2 w-2">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-zinc-500 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-zinc-700 dark:bg-zinc-300"></span>
                  </span>
                 Available for work
               </div>
               <h1 class="text-4xl sm:text-5xl md:text-6xl font-bold tracking-tight text-gray-900 dark:text-white leading-tight">
                 Building reliable backend systems<br />
                 <span class="text-gray-700 dark:text-gray-200">for real-world scale.</span>
               </h1>
               <h2 class="text-xl md:text-2xl text-gray-600 dark:text-gray-300 font-medium">${name} · ${title}</h2>
               <p class="text-base md:text-lg text-gray-600 dark:text-gray-400 leading-relaxed max-w-2xl">
                 ${summary}
               </p>
               
               <div class="flex flex-wrap gap-3 sm:gap-4 pt-2">
                 ${hero.ctaButtons.map((btn, idx) => `
                   <a href="${btn.url}" target="_blank" rel="noopener noreferrer" class="${idx === 0 ? 
                     'bg-gray-900 dark:bg-white text-white dark:text-gray-900 hover:bg-gray-800 dark:hover:bg-gray-200' : 
                     'bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 hover:border-gray-400 dark:hover:border-gray-400'} 
                     px-5 sm:px-6 py-3 rounded-xl font-medium transition-all duration-300 shadow-sm hover:shadow-md flex items-center gap-2">
                     ${btn.text}
                     ${idx === 0 ? '<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>' : ''}
                   </a>
                 `).join('')}
               </div>
               
               <div class="soft-divider my-2"></div>
               <div class="flex gap-3 pt-1">
                 ${social.items.map(s => `
                   <a href="${s.url}" target="_blank" rel="noopener noreferrer" class="text-gray-500 hover:text-gray-900 dark:hover:text-white transition-colors p-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg">
                     ${getIcon(s.platform)}
                   </a>
                 `).join('')}
               </div>
            </div>

            <div class="lg:col-span-1 grid grid-cols-1 gap-4">
              <div class="glass-panel rounded-2xl p-5">
                <div class="kicker">Current Location</div>
                <div class="text-xl font-semibold mt-2 dark:text-white">${location}</div>
              </div>
              <div class="glass-panel rounded-2xl p-5">
                <div class="kicker">Core Strength</div>
                <div class="text-xl font-semibold mt-2 text-gray-800 dark:text-gray-100">Backend Performance & Reliability</div>
              </div>
              <div class="glass-panel rounded-2xl p-5">
                <div class="kicker">Open To</div>
                <div class="text-xl font-semibold mt-2 dark:text-white">High-impact backend roles</div>
              </div>
            </div>
          </section>
        `;

        // --- SKILLS & ABOUT (Bento Grid) ---
        if (about.enabled) {
          contentHTML += `
            <section id="about" class="reveal section-shell">
              <h3 class="section-title text-xl font-bold mb-8 flex items-center gap-3">
                <span class="w-8 h-[2px] bg-gray-800 dark:bg-gray-200"></span>
                Tech Stack
              </h3>
              <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="glass-panel p-6 rounded-2xl">
                   <h4 class="text-lg font-semibold mb-4 text-gray-800 dark:text-white">Technologies</h4>
                   <div class="flex flex-wrap gap-2">
                     ${about.skills.items.map(skill => `
                      <span class="px-3 py-1 text-sm bg-gray-100 dark:bg-gray-800 text-gray-700 dark:text-gray-300 rounded-md border border-gray-200 dark:border-gray-700 hover:border-gray-400 transition-colors cursor-default">
                         ${skill}
                       </span>
                     `).join('')}
                   </div>
                </div>
                   <div class="grid grid-cols-2 gap-4">
                   <div class="glass-panel p-6 rounded-2xl flex flex-col justify-center items-center text-center">
                      <span class="stat-value font-bold text-gray-900 dark:text-gray-100 mb-1">${experienceYears}</span>
                      <span class="text-xs text-gray-500 uppercase tracking-wider">Years Exp</span>
                   </div>
                   <div class="glass-panel p-6 rounded-2xl flex flex-col justify-center items-center text-center">
                      <span class="stat-value font-bold text-gray-900 dark:text-gray-100 mb-1">${leetCodeSolved}</span>
                      <span class="text-xs text-gray-500 uppercase tracking-wider">LeetCode</span>
                   </div>
                   <div class="col-span-2 glass-panel p-6 rounded-2xl flex items-center justify-between">
                      <div>
                        <div class="text-sm text-gray-500">Current Location</div>
                        <div class="font-semibold text-lg dark:text-white">${location}</div>
                      </div>
                      <div class="text-right">
                         <div class="text-sm text-gray-500">Focus</div>
                         <div class="font-semibold text-lg text-gray-900 dark:text-gray-100">Backend Systems</div>
                      </div>
                   </div>
                </div>
              </div>
            </section>
          `;
        }

        // --- EXPERIENCE (Vertical Timeline) ---
        if (experience.enabled) {
          contentHTML += `
            <section id="experience" class="reveal section-shell">
              <h3 class="section-title text-xl font-bold mb-8 flex items-center gap-3">
                <span class="w-8 h-[2px] bg-gray-800 dark:bg-gray-200"></span>
                Experience
              </h3>
              <div class="space-y-8 relative border-l-2 border-gray-200 dark:border-gray-800 ml-3 md:ml-6">
                 ${experience.items.map(job => `
                   <div class="relative pl-8 md:pl-12 group">
                    <span class="absolute -left-[9px] top-2 h-4 w-4 rounded-full bg-white dark:bg-gray-900 border-2 border-gray-700 dark:border-gray-200 group-hover:scale-125 transition-transform"></span>
                     
                     <div class="glass-panel rounded-2xl p-5 border border-gray-100/70 dark:border-gray-800/90">
                     <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-1 mb-2">
                       <h4 class="text-xl font-bold text-gray-900 dark:text-white group-hover:text-gray-900 dark:group-hover:text-white transition-colors">${job.position}</h4>
                       <span class="text-sm font-mono text-gray-500 bg-gray-100 dark:bg-gray-800 px-2 py-1 rounded">${job.period}</span>
                     </div>
                     <div class="text-lg text-gray-700 dark:text-gray-300 font-medium mb-3">${job.company}</div>
                     <div class="border-l-2 border-transparent hover:border-gray-300 dark:hover:border-gray-700 pl-4 transition-colors">
                       ${renderExperienceDescription(job.description)}
                     </div>
                     </div>
                   </div>
                 `).join('')}
              </div>
            </section>
          `;
        }

        // --- PROJECTS (Grid Cards) ---
        if (projects.enabled) {
          contentHTML += `
            <section id="projects" class="reveal section-shell">
              <h3 class="section-title text-xl font-bold mb-8 flex items-center gap-3">
                <span class="w-8 h-[2px] bg-gray-800 dark:bg-gray-200"></span>
                Featured Projects
              </h3>
              <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                ${projects.items.map(proj => `
                  <div class="glass-panel p-6 rounded-2xl card-hover flex flex-col h-full border border-gray-100/70 dark:border-gray-800/80">
                    <div class="flex justify-between items-start mb-4">
                      <div class="p-2 rounded-lg bg-gray-100 dark:bg-gray-800 text-gray-900 dark:text-white">
                         <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                      </div>
                      <div class="flex gap-3">
                        ${proj.repoUrl ? `<a href="${proj.repoUrl}" target="_blank" rel="noopener noreferrer" class="text-gray-400 hover:text-gray-900 dark:hover:text-white">${getIcon('github')}</a>` : ''}
                        ${proj.previewUrl ? `<a href="${proj.previewUrl}" target="_blank" rel="noopener noreferrer" class="text-gray-400 hover:text-gray-700 dark:hover:text-gray-200">${getIcon('link')}</a>` : ''}
                      </div>
                    </div>
                    
                    <h4 class="text-xl font-bold text-gray-900 dark:text-white mb-2">${proj.title}</h4>
                    <p class="text-gray-600 dark:text-gray-400 text-sm mb-6 flex-grow leading-relaxed">
                      ${proj.description}
                    </p>
                    
                    <div class="flex flex-wrap gap-2 mt-auto pt-4 border-t border-gray-100 dark:border-gray-800">
                      ${proj.tags.map(tag => `
                        <span class="text-xs font-mono text-gray-500">#${tag}</span>
                      `).join('')}
                    </div>
                  </div>
                `).join('')}
              </div>
            </section>
          `;
        }

        // --- EDUCATION ---
        if (education && education.enabled) {
          contentHTML += `
            <section id="education" class="reveal section-shell">
              <h3 class="section-title text-xl font-bold mb-8 flex items-center gap-3">
                <span class="w-8 h-[2px] bg-gray-800 dark:bg-gray-200"></span>
                Education
              </h3>
              <div class="space-y-4">
                ${education.items.map(item => `
                  <div class="glass-panel p-6 rounded-2xl flex flex-col sm:flex-row sm:items-center justify-between gap-4 transition-all hover:border-gray-400/50">
                    <div>
                      <h4 class="text-lg font-bold text-gray-900 dark:text-white">${item.institution}</h4>
                      <p class="text-gray-600 dark:text-gray-400 text-sm">${item.degree}</p>
                    </div>
                    <span class="text-sm font-mono text-gray-500 bg-gray-100 dark:bg-gray-800 px-3 py-1 rounded-full whitespace-nowrap">
                      ${item.period}
                    </span>
                  </div>
                `).join('')}
              </div>
            </section>
          `;
        }

        // --- ACHIEVEMENTS ---
        if (achievements.enabled) {
          contentHTML += `
            <section id="achievements" class="reveal section-shell">
              <h3 class="section-title text-xl font-bold mb-6 flex items-center gap-3">
                <span class="w-8 h-[2px] bg-gray-800 dark:bg-gray-200"></span>
                Achievements
              </h3>
              <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                 ${achievements.items.map(item => `
                   <div class="flex items-start gap-4 p-4 rounded-xl border border-gray-100 dark:border-gray-800 hover:bg-gray-50 dark:hover:bg-gray-800/50 transition-colors shadow-sm">
                      <div class="text-yellow-500 mt-1">
                        <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                      </div>
                      <div>
                        <h4 class="font-bold text-gray-900 dark:text-white text-sm">${item.title}</h4>
                        <p class="text-xs text-gray-500 mt-1">${item.description}</p>
                      </div>
                   </div>
                 `).join('')}
              </div>
            </section>
          `;
        }

        // --- CONTACT ---
        contentHTML += `
           <section id="contact" class="reveal py-12">
             <div class="glass-panel rounded-3xl p-8 md:p-12 text-center relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1 bg-gray-800 dark:bg-gray-200"></div>
                <h2 class="text-3xl md:text-4xl font-bold mb-6 text-gray-900 dark:text-white">Let's Build Something Scalable</h2>
                <p class="text-gray-600 dark:text-gray-400 mb-8 max-w-lg mx-auto">
                   I'm currently open to new opportunities. Whether you have a question or just want to say hi, I'll try my best to get back to you!
                </p>
                <a href="mailto:${contact.email}" class="inline-flex items-center gap-2 bg-gray-900 dark:bg-white text-white dark:text-gray-900 px-8 py-4 rounded-full font-bold text-lg hover:scale-105 transition-transform shadow-lg shadow-blue-500/10">
                   <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                   Say Hello
                </a>
             </div>
           </section>
        `;

        // Render to DOM
        document.getElementById('app').innerHTML = contentHTML;
      }

      // --- Animation & UX Utils ---

      function setupScrollObserver() {
        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              entry.target.classList.add('active');
            }
          });
        }, { threshold: 0.1 });

        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
      }

      function setupActiveNav() {
        const sections = [...document.querySelectorAll('main section[id]')];
        const navLinks = [...document.querySelectorAll('.nav-link')];
        const updateActive = () => {
          let current = sections[0]?.id || 'home';
          sections.forEach(section => {
            const rect = section.getBoundingClientRect();
            if (rect.top <= 140) current = section.id;
          });
          navLinks.forEach(link => {
            const href = link.getAttribute('href');
            link.classList.toggle('nav-link-active', href === `#${current}` || (current === 'home' && href === '/'));
          });
        };
        window.addEventListener('scroll', updateActive, { passive: true });
        updateActive();
      }

      // --- Theme Handling ---
      const themeToggle = document.getElementById('theme-toggle');
      const sunIcon = document.getElementById('sun-icon');
      const moonIcon = document.getElementById('moon-icon');
      
      const userTheme = localStorage.getItem('theme');
      const systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches;
      
      const toggleTheme = (isDark) => {
        if (isDark) {
          document.documentElement.classList.add('dark');
          sunIcon.classList.remove('hidden');
          moonIcon.classList.add('hidden');
          localStorage.setItem('theme', 'dark');
        } else {
          document.documentElement.classList.remove('dark');
          sunIcon.classList.add('hidden');
          moonIcon.classList.remove('hidden');
          localStorage.setItem('theme', 'light');
        }
      };
      
      // Initial check
      if (userTheme === 'dark' || (!userTheme && systemTheme)) {
        toggleTheme(true);
      } else {
        toggleTheme(false);
      }
      
      themeToggle.addEventListener('click', () => {
        const isDark = document.documentElement.classList.contains('dark');
        toggleTheme(!isDark);
      });

      // --- Mobile Menu ---
      const mobileMenuBtn = document.getElementById('mobile-menu-btn');
      const mobileMenu = document.getElementById('mobile-menu');
      
      function toggleMobileMenu() {
        const isOpen = !mobileMenu.classList.contains('-translate-x-full');
        if (isOpen) {
          mobileMenu.classList.add('-translate-x-full');
          document.body.style.overflow = '';
        } else {
          mobileMenu.classList.remove('-translate-x-full');
          document.body.style.overflow = 'hidden';
        }
      }
      
      mobileMenuBtn.addEventListener('click', toggleMobileMenu);

      // Start App
      document.addEventListener('DOMContentLoaded', loadPortfolio);

    </script>
  </body>
</html>
